# PR Checks Workflow
# Runs on every push to PR branches and main
# Fast-feedback: OpenAPI validation, doc lint, smoke E2E tests

name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Contract Validation: Validate OpenAPI specs
  # ─────────────────────────────────────────────────────────────────
  contract-validation:
    name: OpenAPI Contract Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate YouCam API spec
        run: npm run lint:openapi:youcam
        continue-on-error: false

      - name: Validate Shopify App API spec
        run: npm run lint:openapi:shopify
        continue-on-error: false

  # ─────────────────────────────────────────────────────────────────
  # Breaking Change Detection: Compare API contracts vs base branch
  # ─────────────────────────────────────────────────────────────────
  breaking-change-detection:
    name: API Breaking Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go for oasdiff
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install oasdiff
        run: go install github.com/tufin/oasdiff@latest

      - name: Check for breaking changes in Shopify App API
        run: |
          git fetch origin ${{ github.base_ref }}
          oasdiff breaking \
            <(git show origin/${{ github.base_ref }}:docs/api/shopify-app-openapi.json 2>/dev/null || echo '{}') \
            docs/api/shopify-app-openapi.json \
            --fail-on ERR
        shell: bash

  # ─────────────────────────────────────────────────────────────────
  # Documentation Validation: Lint markdown files
  # ─────────────────────────────────────────────────────────────────
  docs-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint documentation
        run: npm run lint:docs

  # ─────────────────────────────────────────────────────────────────
  # Smoke E2E Tests: Critical path validation
  # ─────────────────────────────────────────────────────────────────
  smoke-e2e:
    name: Smoke E2E Tests
    runs-on: ubuntu-latest
    needs: [contract-validation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run smoke E2E tests
        run: npm run test:e2e:smoke
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-e2e-results
          path: |
            test-results/
            coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────
  # Security Scan: Dependency vulnerability check
  # ─────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run npm audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in codebase
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────────────────────────────
  # PR Status Summary
  # ─────────────────────────────────────────────────────────────────
  pr-summary:
    name: PR Status Summary
    runs-on: ubuntu-latest
    needs: [contract-validation, docs-validation, smoke-e2e, security-scan]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Check job results
        run: |
          echo "## PR Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Validation | ${{ needs.contract-validation.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Validation | ${{ needs.docs-validation.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke E2E | ${{ needs.smoke-e2e.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any required job failed
        if: |
          needs.contract-validation.result != 'success' ||
          needs.docs-validation.result != 'success' ||
          needs.smoke-e2e.result != 'success'
        run: exit 1
